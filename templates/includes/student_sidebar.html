<!-- Student Sidebar -->
<aside class="hidden md:flex flex-col h-screen w-64 border-r border-slate-200 bg-slate-50 fixed left-0 top-0 z-50 py-6 px-4 gap-2">

    <!-- Logo -->
    {% comment %} <div class="flex items-center gap-3 px-4 mb-8">
        <div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center">
            <span class="material-symbols-outlined text-white"
                  style="font-variation-settings: 'FILL' 1;">
                school
            </span>
        </div>

        <div>
            <h1 class="text-lg font-black text-blue-700 tracking-tight leading-none">
                CourseHub
            </h1>
            <p class="text-xs font-semibold text-slate-500">
                Student Portal
            </p>
        </div>
    </div> {% endcomment %}

    <!-- Student Info -->
    <div class="px-4 mb-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
                <span class="material-symbols-outlined text-blue-700">
                    person
                </span>
            </div>

            <div>
                <p class="font-semibold text-slate-800">
                    {{ request.user.username }}
                </p>

                <p class="text-xs text-slate-500">
                    {{ request.user.role|title }}
                </p>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 flex flex-col gap-2">

        <!-- Dashboard -->
        <a class="flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-slate-100 rounded-lg transition-all"
           href="{% url 'student_dashboard' %}">
            <span class="material-symbols-outlined">dashboard</span>
            <span>Dashboard</span>
        </a>

        <!-- My Courses -->
        <a class="flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-slate-100 rounded-lg transition-all"
           href="{% url 'my_enrollments' %}">
            <span class="material-symbols-outlined">school</span>
            <span>My Courses</span>
        </a>

        <!-- Wishlist -->
        <a class="flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-slate-100 rounded-lg transition-all"
           href="{% url 'wishlist' %}">
            <span class="material-symbols-outlined">favorite</span>
            <span>Wishlist</span>
        </a>

        <!-- Profile -->
        <a class="flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-slate-100 rounded-lg transition-all"
           href="{% url 'student_profile' %}">
            <span class="material-symbols-outlined">person</span>
            <span>Profile</span>
        </a>

    </nav>

    <!-- Logout -->
    <div class="mt-auto pt-6 border-t border-slate-200">
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}

        <button
            type="submit"
            class="w-full flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-red-50 hover:text-red-600 rounded-lg transition-all text-left">

            <span class="material-symbols-outlined">logout</span>
            <span>Logout</span>

        </button>
    </form>
    </div>

</aside>
